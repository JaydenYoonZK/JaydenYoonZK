<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Jayden Yoon ZK profile hero</title>
  <desc id="desc">Full-stack developer working on WHMCS tools, admin panels, billing flows, and useful automation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#000000"/>
      <stop offset="0.56" stop-color="#191412"/>
      <stop offset="1" stop-color="#544741"/>
    </linearGradient>
    <linearGradient id="edge" x1="88" y1="430" x2="1112" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#abcf37" stop-opacity="0"/>
      <stop offset="0.2" stop-color="#abcf37"/>
      <stop offset="0.8" stop-color="#abcf37"/>
      <stop offset="1" stop-color="#abcf37" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#ffffff" stroke-opacity="0.045"/>
    </pattern>
  </defs>

  <rect width="1200" height="520" rx="44" fill="url(#bg)"/>
  <rect width="1200" height="520" rx="44" fill="url(#grid)"/>
  <rect x="48" y="48" width="1104" height="424" rx="38" fill="#000000" fill-opacity="0.28" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

  <rect x="-320" y="0" width="320" height="520" fill="#abcf37" opacity="0.08">
    <animate attributeName="x" values="-320;1200" dur="8s" repeatCount="indefinite"/>
  </rect>

  <g transform="translate(888 92)" opacity="0.68">
    <circle cx="98" cy="98" r="76" stroke="#abcf37" stroke-width="3"/>
    <circle cx="98" cy="98" r="30" stroke="#abcf37" stroke-width="3">
      <animate attributeName="r" values="30;42;30" dur="4.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.45;1" dur="4.8s" repeatCount="indefinite"/>
    </circle>
    <path d="M8 98H188M98 8V188" stroke="#abcf37" stroke-width="3" stroke-opacity="0.7"/>
  </g>

  <text x="88" y="136" fill="#abcf37" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="30" font-weight="900" letter-spacing="5">FULL-STACK DEVELOPER</text>
  <text x="86" y="232" fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="92" font-weight="950" letter-spacing="0">Jayden Yoon ZK</text>
  <text x="90" y="302" fill="#ffffff" fill-opacity="0.86" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="38" font-weight="720">Web tools for online businesses.</text>
  <text x="90" y="354" fill="#ffffff" fill-opacity="0.72" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="30" font-weight="620">Client portals, admin screens, billing flows, and small automations.</text>

  <rect x="88" y="430" width="1024" height="9" rx="4.5" fill="#ffffff" fill-opacity="0.08"/>
  <rect x="88" y="430" width="1024" height="9" rx="4.5" fill="url(#edge)">
    <animate attributeName="opacity" values="0.55;1;0.55" dur="5.5s" repeatCount="indefinite"/>
  </rect>
</svg>
