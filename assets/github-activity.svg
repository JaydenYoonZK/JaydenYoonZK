<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">What I build</title>
  <desc id="desc">Client portals and dashboards, billing flows and WHMCS tooling, content utilities, and privacy-first browser tools.</desc>
  <defs>
    <linearGradient id="f-surface" x1="0" y1="0" x2="1200" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#080706"/>
      <stop offset="0.5" stop-color="#12100d"/>
      <stop offset="1" stop-color="#2a241f"/>
    </linearGradient>
    <radialGradient id="f-glow" cx="0.85" cy="0" r="1">
      <stop offset="0" stop-color="#abcf37" stop-opacity="0.06"/>
      <stop offset="0.5" stop-color="#abcf37" stop-opacity="0.015"/>
      <stop offset="1" stop-color="#abcf37" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="f-baseline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#abcf37" stop-opacity="0"/>
      <stop offset="0.3" stop-color="#abcf37" stop-opacity="0.7"/>
      <stop offset="0.7" stop-color="#d7ec84" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#abcf37" stop-opacity="0"/>
    </linearGradient>
    <filter id="f-grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.03"/></feComponentTransfer>
    </filter>
    <clipPath id="f-clip"><rect width="1200" height="430" rx="40"/></clipPath>
  </defs>

  <g clip-path="url(#f-clip)" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif">
    <rect width="1200" height="430" rx="40" fill="url(#f-surface)"/>
    <rect width="1200" height="430" rx="40" fill="url(#f-glow)"/>
    <rect width="1200" height="430" rx="40" filter="url(#f-grain)" opacity="0.5"/>

    <text x="96" y="86" fill="#abcf37" font-size="17" font-weight="800" letter-spacing="4">FOCUS</text>
    <text x="94" y="136" fill="#f3f0e9" font-size="40" font-weight="800" letter-spacing="-0.5">What you&#8217;ll find here</text>
    <text x="880" y="134" fill="#a39c91" font-size="18" font-weight="500">Small tools, clear docs.</text>

    <!-- card 1: client portals -->
    <g transform="translate(96 172)">
      <rect width="494" height="92" rx="24" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.10"/>
      <rect x="22" y="24" width="44" height="44" rx="14" fill="#abcf37" fill-opacity="0.13" stroke="#abcf37" stroke-opacity="0.35"/>
      <g stroke="#c5e35c" stroke-width="2.4" stroke-linecap="round">
        <rect x="33" y="36" width="22" height="19" rx="4" fill="none"/>
        <path d="M33 42H55"/>
        <circle cx="37.5" cy="39" r="0.4" fill="#c5e35c"/>
      </g>
      <text x="86" y="42" fill="#f3f0e9" font-size="22" font-weight="700">Client portals &amp; dashboards</text>
      <text x="86" y="68" fill="#a39c91" font-size="16" font-weight="500">Screens people actually use every day.</text>
    </g>

    <!-- card 2: billing -->
    <g transform="translate(610 172)">
      <rect width="494" height="92" rx="24" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.10"/>
      <rect x="22" y="24" width="44" height="44" rx="14" fill="#abcf37" fill-opacity="0.13" stroke="#abcf37" stroke-opacity="0.35"/>
      <g stroke="#c5e35c" stroke-width="2.4" stroke-linecap="round">
        <rect x="33" y="37" width="22" height="17" rx="4" fill="none"/>
        <path d="M33 43H55"/>
        <path d="M37 49.5H43"/>
      </g>
      <text x="86" y="42" fill="#f3f0e9" font-size="22" font-weight="700">Billing flows &amp; WHMCS tooling</text>
      <text x="86" y="68" fill="#a39c91" font-size="16" font-weight="500">Invoices, client areas, and their quirks.</text>
    </g>

    <!-- card 3: content utilities -->
    <g transform="translate(96 282)">
      <rect width="494" height="92" rx="24" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.10"/>
      <rect x="22" y="24" width="44" height="44" rx="14" fill="#abcf37" fill-opacity="0.13" stroke="#abcf37" stroke-opacity="0.35"/>
      <g stroke="#c5e35c" stroke-width="2.4" stroke-linecap="round">
        <path d="M34 38H54"/>
        <path d="M34 45.5H49"/>
        <path d="M34 53H52"/>
      </g>
      <text x="86" y="42" fill="#f3f0e9" font-size="22" font-weight="700">Content &amp; copy utilities</text>
      <text x="86" y="68" fill="#a39c91" font-size="16" font-weight="500">Paste-safe text and metadata helpers.</text>
    </g>

    <!-- card 4: automations -->
    <g transform="translate(610 282)">
      <rect width="494" height="92" rx="24" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.10"/>
      <rect x="22" y="24" width="44" height="44" rx="14" fill="#abcf37" fill-opacity="0.13" stroke="#abcf37" stroke-opacity="0.35"/>
      <g stroke="#c5e35c" stroke-width="2.4" stroke-linecap="round" fill="none">
        <rect x="35.5" y="44" width="18" height="14" rx="4"/>
        <path d="M39.5 44V39.5A5 5 0 0 1 49.5 39.5V44"/>
      </g>
      <text x="86" y="42" fill="#f3f0e9" font-size="22" font-weight="700">Privacy-first browser tools</text>
      <text x="86" y="68" fill="#a39c91" font-size="16" font-weight="500">Everything runs on your device.</text>
    </g>

    <rect x="96" y="398" width="1008" height="2.5" rx="1.25" fill="url(#f-baseline)">
      <animate attributeName="opacity" values="0.45;0.9;0.45" dur="7s" repeatCount="indefinite"/>
    </rect>
  </g>
  <rect x="1" y="1" width="1198" height="428" rx="39" stroke="#ffffff" stroke-opacity="0.13" stroke-width="2"/>
</svg>
