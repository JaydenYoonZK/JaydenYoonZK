<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Recent GitHub work</title>
  <desc id="desc">Recent work includes a WHMCS guide, JSON data, GitHub Pages cleanup, and issue templates.</desc>
  <defs>
    <linearGradient id="activity-surface" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050604"/>
      <stop offset="0.42" stop-color="#10110e"/>
      <stop offset="0.78" stop-color="#24211e"/>
      <stop offset="1" stop-color="#544741"/>
    </linearGradient>
    <linearGradient id="activity-panel" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="0.42" stop-color="#ffffff" stop-opacity="0.055"/>
      <stop offset="1" stop-color="#abcf37" stop-opacity="0.055"/>
    </linearGradient>
    <linearGradient id="activity-accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#abcf37" stop-opacity="0"/>
      <stop offset="0.22" stop-color="#abcf37" stop-opacity="0.85"/>
      <stop offset="0.58" stop-color="#f7f5ee" stop-opacity="0.7"/>
      <stop offset="0.86" stop-color="#78d7c8" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#78d7c8" stop-opacity="0"/>
    </linearGradient>
    <filter id="activity-grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.035"/>
      </feComponentTransfer>
    </filter>
    <clipPath id="activity-clip"><rect width="1200" height="520" rx="46"/></clipPath>
  </defs>
  <g clip-path="url(#activity-clip)">
    <rect width="1200" height="520" rx="46" fill="url(#activity-surface)"/>
    <rect width="1200" height="520" rx="46" filter="url(#activity-grain)" opacity="0.42"/>
    <path d="M0 98C202 54 366 74 524 138C726 218 908 190 1200 82V520H0V98Z" fill="#78d7c8" opacity="0.026"/>
    <rect x="1" y="1" width="1198" height="518" rx="45" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="76" y="90" fill="#c9df6b" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="29" font-weight="850">Recent work</text>
    <text x="76" y="169" fill="#f7f5ee" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="70" font-weight="950">Small projects, kept tidy.</text>
    <text x="80" y="226" fill="#c9c4ba" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="29" font-weight="650">Useful, tested, and easy to revisit later.</text>

    <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
<g>
      <rect x="76" y="276" width="502" height="78" rx="30" fill="#ffffff" fill-opacity="0.065" stroke="#ffffff" stroke-opacity="0.12"/>
      <rect x="100" y="294" width="42" height="42" rx="15" fill="#abcf37"/>
      <text x="114" y="324" fill="#050604" font-size="25" font-weight="950">1</text>
      <text x="162" y="309" fill="#f7f5ee" font-size="27" font-weight="850">WHMCS emoji guide</text>
      <text x="162" y="334" fill="#c9c4ba" font-size="17" font-weight="620">Copy board and compatibility notes</text>
    </g>
<g>
      <rect x="622" y="276" width="502" height="78" rx="30" fill="#ffffff" fill-opacity="0.065" stroke="#ffffff" stroke-opacity="0.12"/>
      <rect x="646" y="294" width="42" height="42" rx="15" fill="#abcf37"/>
      <text x="660" y="324" fill="#050604" font-size="25" font-weight="950">2</text>
      <text x="708" y="309" fill="#f7f5ee" font-size="27" font-weight="850">JSON data export</text>
      <text x="708" y="334" fill="#c9c4ba" font-size="17" font-weight="620">Data that is easy to reuse</text>
    </g>
<g>
      <rect x="76" y="374" width="502" height="78" rx="30" fill="#ffffff" fill-opacity="0.065" stroke="#ffffff" stroke-opacity="0.12"/>
      <rect x="100" y="392" width="42" height="42" rx="15" fill="#abcf37"/>
      <text x="114" y="422" fill="#050604" font-size="25" font-weight="950">3</text>
      <text x="162" y="407" fill="#f7f5ee" font-size="27" font-weight="850">GitHub Pages cleanup</text>
      <text x="162" y="432" fill="#c9c4ba" font-size="17" font-weight="620">Sitemap, robots, metadata</text>
    </g>
<g>
      <rect x="622" y="374" width="502" height="78" rx="30" fill="#ffffff" fill-opacity="0.065" stroke="#ffffff" stroke-opacity="0.12"/>
      <rect x="646" y="392" width="42" height="42" rx="15" fill="#abcf37"/>
      <text x="660" y="422" fill="#050604" font-size="25" font-weight="950">4</text>
      <text x="708" y="407" fill="#f7f5ee" font-size="27" font-weight="850">Issue templates</text>
      <text x="708" y="432" fill="#c9c4ba" font-size="17" font-weight="620">Cleaner public project flow</text>
    </g>
    </g>

    <rect x="76" y="478" width="1048" height="4" rx="2" fill="#ffffff" fill-opacity="0.08"/>
    <rect x="76" y="478" width="1048" height="4" rx="2" fill="url(#activity-accentLine)" opacity="0.76">
      <animate attributeName="opacity" values="0.42;0.82;0.42" dur="7.5s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
